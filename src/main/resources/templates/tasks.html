<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" th:href="@{/css/tasks.css}">
</head>
<body>
    <div class="top-bar">
        <button id="authBtn">Log out</button>
    </div>

<div class="container">

    <h1>Task Manager</h1>


    <!-- Creating task form -->
    <div class="task-form">
        <input type="text" placeholder="Task name" id="taskTitle">
        <input type="text" placeholder="Description" id="taskDescription">
        <button id="addBtn">Add</button>
    </div>

    <!-- Task list-->
    <div class="task-list" id="task-list">

    </div>

</div>

<div id="errorModal" class="modal hidden">
    <div class="modal-content">
        <p id="errorMessage"></p>
        <button onclick="closeError()">OK</button>
    </div>
</div>

<!-- Update Task Modal -->
<div id="updateModal" class="modal hidden">
    <div class="modal-content">
        <h3>Update task</h3>

        <input type="text" id="updateTaskTitle" placeholder="Task name">
        <input type="text" id="updateTaskDescription" placeholder="Description">

        <div style="margin-top:15px;">
            <button id="saveUpdateBtn" class="save-btn">Save</button>
            <button onclick="closeUpdateModal()">Cancel</button>
        </div>
    </div>
</div>

<script th:src="@{/scripts/tasks.js}"></script>
</body>
</html>
