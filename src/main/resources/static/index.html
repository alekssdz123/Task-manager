<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Task Manager</h1>

    <!-- Creating task form -->

        <input type="text" placeholder="Описание" id="taskDescription">
        <button id="addBtn">Add</button>
    </div>

    <!-- Task list-->
    <div class="task-list" id="task-list">

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
